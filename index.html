<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vidly | Cable Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --n-red: #E50914;
            --n-black: #0a0a0a;
            --n-dark-grey: #141414;
            --ui-transition: opacity 0.5s ease, visibility 0.5s;
        }

        body {
            margin: 0;
            background-color: #000;
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Main Viewport */
        #playerNode {
            position: relative;
            flex-grow: 1;
            background: #000;
            cursor: default;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Hide UI & Cursor when idle */
        .idle #playerNode { cursor: none; }
        .idle .overlay, .idle .channel-panel { opacity: 0; visibility: hidden; }

        video { width: 100%; height: 100%; object-fit: contain; }

        /* HUD Overlays */
        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 20%, transparent 80%, rgba(0,0,0,0.9) 100%);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px;
            z-index: 10;
            transition: var(--ui-transition);
        }

        /* Side Channel Panel */
        .channel-panel {
            width: 300px;
            background: rgba(10, 10, 10, 0.95);
            border-left: 1px solid #333;
            display: flex;
            flex-direction: column;
            transition: var(--ui-transition);
            z-index: 20;
            backdrop-filter: blur(10px);
        }

        .channel-header {
            padding: 25px;
            font-size: 1.2rem;
            font-weight: bold;
            border-bottom: 1px solid #222;
            color: var(--n-red);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .channel-list {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .channel-item {
            padding: 15px 25px;
            cursor: pointer;
            transition: 0.2s;
            border-left: 3px solid transparent;
            color: #aaa;
        }

        .channel-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .channel-item.active {
            background: rgba(229, 9, 20, 0.1);
            border-left: 3px solid var(--n-red);
            color: #fff;
            font-weight: bold;
        }

        /* Visualizer & Controls */
        .wave-container { position: absolute; bottom: 100px; left: 30px; width: calc(100% - 60px); height: 40px; pointer-events: none; }
        #audioLine { width: 100%; height: 100%; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; gap: 15px; }
        .live-badge { background: var(--n-red); padding: 4px 10px; border-radius: 2px; font-size: 11px; font-weight: bold; }
        .logo {
            width: 42px;
            height: 42px;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.08);
        }

        .bottom-controls { display: flex; align-items: center; gap: 20px; }
        .btn {
            background: none; border: none; color: white; cursor: pointer;
            font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px;
        }
        .btn-main { background: #fff; color: #000; padding: 10px 20px; border-radius: 4px; }
        .btn-main:hover { background: #e6e6e6; }
        .btn-rec.active { background: var(--n-red); color: white; animation: pulse 1s infinite; }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(229, 9, 20, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(229, 9, 20, 0); } 100% { box-shadow: 0 0 0 0 rgba(229, 9, 20, 0); } }

        /* Loading Spinner */
        .spinner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid var(--n-red);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            z-index: 15;
            display: none;
        }

        @keyframes spin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="playerNode">
        <video id="video" crossorigin="anonymous" autoplay></video>
        
        <div class="spinner" id="spinner"></div>
        
        <div class="wave-container">
            <canvas id="audioLine"></canvas>
        </div>

        <div class="overlay">
            <div class="top-bar">
                <div>
                    <span class="live-badge">LIVE</span>
                    <span id="currentChannelName" style="margin-left: 15px; font-size: 1.2rem; font-weight: bold;">Channel Name</span>
                </div>
                <div id="recTimer" style="color: var(--n-red); font-family: monospace; font-weight: bold; display: none;">00:00:00</div>
            </div>

            <div class="bottom-controls">
                <button class="btn btn-main" id="playBtn">▶ PLAY</button>
                <button class="btn btn-main btn-rec" id="recBtn">● RECORD</button>
                <button class="btn" id="fsBtn">⛶ FULLSCREEN</button>
                
                <div style="flex-grow: 1;"></div>
                
                <select id="format">
                    <option value="webm">WebM (Ultra Quality)</option>
                    <option value="mp4">MP4 (Standard)</option>
                </select>
                <button class="btn" id="pipBtn">Picture-in-Picture</button>
            </div>
        </div>
    </div>

    </div>

            { name: "90s Throwback", url: "https://jmp2.uk/plu-5f4d86f519358a00072b978e.m3u8" },
            { name: "BET Cinema", url: "https://jmp2.uk/plu-58af4c093a41ca9d4ecabe96.m3u8" },
            { name: "Classic Movies Channel", url: "https://jmp2.uk/plu-561c5b0dada51f8004c4d855.m3u8" },
            { name: "30A Television Channel", url: "https://30a-tv.com/feeds/masters/30atv.m3u8" },
            { name: "30A TV Classic Movies", url: "https://30a-tv.com/feeds/pzaz/30atvmovies.m3u8" }
        ];

        const video = document.getElementById('video');
        const channelListElem = document.getElementById('channelList');
        const currentChannelName = document.getElementById('currentChannelName');
        const playBtn = document.getElementById('playBtn');
        const recBtn = document.getElementById('recBtn');
        const spinner = document.getElementById('spinner');
        let hls = new Hls();
        let mediaRecorder;
        let recordedChunks = [];
        let idleTimer;

        // 1. Load Channels into Sidebar
        function initChannels() {
            channels.forEach((ch, index) => {
                const div = document.createElement('div');
                div.className = 'channel-item' + (index === 0 ? ' active' : '');
                div.innerText = `${String(index + 1).padStart(2, '0')} ${ch.name}`;
                div.onclick = () => switchChannel(index, div);
                channelListElem.appendChild(div);
            });
            loadSource(channels[0].url);
            currentChannelName.innerText = channels[0].name;
        }

        function switchChannel(index, elem) {
            document.querySelectorAll('.channel-item').forEach(i => i.classList.remove('active'));
            elem.classList.add('active');
            currentChannelName.innerText = channels[index].name;
            loadSource(channels[index].url);
        }

        function loadSource(url) {
            spinner.style.display = 'block';
            if (Hls.isSupported()) {
                hls.destroy();
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play();
                    spinner.style.display = 'none';
                });
                hls.on(Hls.Events.ERROR, () => {
                    spinner.style.display = 'none';
                });
            }
        }

        // 2. Play/Pause
        playBtn.onclick = () => {
            if (video.paused) video.play();
            else video.pause();
        };
        video.onplay = () => {
            playBtn.innerText = '⏸ PAUSE';
            spinner.style.display = 'none';
        };
        video.onpause = () => playBtn.innerText = '▶ PLAY';
        video.onerror = () => spinner.style.display = 'none';

        // 3. UI Auto-Hide Logic
        function resetIdle() {
            document.body.classList.remove('idle');
            clearTimeout(idleTimer);
            idleTimer = setTimeout(() => {
                document.body.classList.add('idle');
            }, 3000);
        }
        window.onmousemove = resetIdle;
        window.onclick = resetIdle;
        window.onkeydown = resetIdle;

        // 4. Recording Logic (Optimized for Performance)
        recBtn.onclick = () => {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                return;
            }
            recordedChunks = [];
            const stream = video.captureStream();
            const selectedFormat = document.getElementById('format').value;
            let mimeType = 'video/webm; codecs=vp9';
            if (selectedFormat === 'mp4' && MediaRecorder.isTypeSupported('video/mp4')) {
                mimeType = 'video/mp4';
            }
            mediaRecorder = new MediaRecorder(stream, {
                mimeType: mimeType,
                videoBitsPerSecond: 2000000  // Reduced from 8Mbps to 2Mbps for better performance
            });
            mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: mimeType });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `Capture-${Date.now()}.${selectedFormat}`;
                a.click();
                recBtn.classList.remove('active');
                document.getElementById('recTimer').style.display = 'none';
            };
            mediaRecorder.start(1000);
            recBtn.classList.add('active');
            document.getElementById('recTimer').style.display = 'block';
        };

        // 5. Audio Line Spectrum
        let audioInit = false;
        
        document.getElementById('fsBtn').onclick = () => document.getElementById('playerNode').requestFullscreen();
        document.getElementById('pipBtn').onclick = () => video.requestPictureInPicture();

        initChannels();
    </script>
